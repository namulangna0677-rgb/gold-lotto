<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💛 금두꺼비 로또번호 추천 명당 💛</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
    <style>
        /* [스타일 부분은 기존과 동일하므로 가독성을 위해 유지합니다] */
        body { background-color: #000; color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100dvh; overflow-x: hidden; overflow-y: auto; position: relative; }
        .wrapper { position: relative; width: 90%; max-width: 400px; display: flex; flex-direction: column; align-items: center; z-index: 10; padding-top: 40px; padding-bottom: 20px; }
        .menu-btn { position: fixed; top: 20px; right: 20px; width: 44px; height: 44px; background: transparent; border: none; z-index: 600; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; }
        .menu-btn span { width: 20px; height: 2px; background: #fbbf24; border-radius: 2px; }
        .menu-dropdown { position: fixed; top: 75px; right: 20px; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; padding: 10px; min-width: 180px; z-index: 550; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .menu-dropdown.show { display: block; opacity: 1; }
        .menu-item { padding: 12px 16px; color: #fff; font-size: 0.9rem; cursor: pointer; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        .pure-title h1 { font-size: clamp(1.6rem, 7vw, 2.3rem); font-weight: 900; background: linear-gradient(145deg, #fff7ad, #fbbf24, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 40px; }
        .toad-box { position: relative; width: 100%; aspect-ratio: 1/1; background: url('https://gold-lotto-three.vercel.app/golden_toad.png') no-repeat center/contain; z-index: 15; }
        #coin-trigger { position: absolute; top: 46%; left: 33%; width: 25%; height: 25%; border-radius: 50%; cursor: pointer; z-index: 200; background: transparent; border: none; outline: none; animation: coinGlowPulse 2s infinite ease-in-out; }
        @keyframes coinGlowPulse { 0% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); } 50% { transform: scale(1.05); box-shadow: 0 0 40px 20px rgba(251, 191, 36, 0.35); } 100% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } }
        #result-area { display: flex; justify-content: center; gap: 8px; margin-top: -30px; z-index: 50; min-height: 50px; width: 100%; }
        .ball { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: white; border: 1.5px solid #fff; animation: trendyPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes trendyPop { 0% { transform: scale(0) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s ease; }
        .modal-content { background: rgba(30, 30, 30, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; padding: 40px 20px; width: 85%; max-width: 340px; text-align: center; }
        .save-btn { background: linear-gradient(135deg, #fbbf24, #d97706); color: #fff; border: none; padding: 15px 0; width: 90%; border-radius: 18px; font-weight: 900; cursor: pointer; margin-top: 20px; }
        .c1 { background: radial-gradient(circle at 30% 30%, #facc15, #ca8a04); }
        .c2 { background: radial-gradient(circle at 30% 30%, #60a5fa, #2563eb); }
        .c3 { background: radial-gradient(circle at 30% 30%, #f87171, #dc2626); }
        .c4 { background: radial-gradient(circle at 30% 30%, #94a3b8, #475569); }
        .c5 { background: radial-gradient(circle at 30% 30%, #4ade80, #16a34a); }
        .page-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #000; z-index: 1500; display: none; overflow-y: auto; padding-top: 70px; }
        .page-header { position: fixed; top: 0; width: 100%; background: #000; padding: 20px; display: flex; align-items: center; gap: 15px; z-index: 1600; }
        .back-btn { color: #fbbf24; cursor: pointer; font-size: 1.5rem; }
        .winning-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin: 10px 20px; }
        .card-ball { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; border: 1px solid #fff; }
        .social-btn { background: #fff; color: #000; border: none; padding: 12px; border-radius: 12px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <canvas id="fxCanvas" style="position:fixed; top:0; left:0; pointer-events:none; z-index:20;"></canvas>
    
    <div class="menu-btn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>

    <div class="menu-dropdown" id="menuDropdown">
        <div id="menu-guest">
            <div class="menu-item" onclick="showAuthModal()">🔑 로그인</div>
            <div class="menu-item" onclick="showWinningHistory()">🏆 역대 당첨번호</div>
        </div>
        <div id="menu-user" style="display: none;">
            <div style="padding: 10px; font-size: 0.8rem; color: #aaa;" id="menuUserEmail"></div>
            <div class="menu-item" onclick="openMyNumbersPage()">💾 내 번호</div>
            <div class="menu-item" onclick="showWinningHistory()">🏆 역대 당첨번호</div>
            <div class="menu-item" onclick="logoutUser()">🚪 로그아웃</div>
        </div>
    </div>

    <div class="wrapper">
        <div class="pure-title"><h1>💛금두꺼비 뚜링이의<br>로또 명당💛</h1></div>
        <div class="toad-box">
            <button id="coin-trigger" type="button"></button>
        </div>
        <div id="result-area"></div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <h2>🎉 행운의 번호! 🎉</h2>
            <div id="modal-numbers" style="display:flex; justify-content:center; gap:5px; margin:20px 0;"></div>
            <button class="save-btn" onclick="saveNumbersWithAuth()">💾 번호 저장하기</button>
            <button style="background:none; border:none; color:#aaa; margin-top:20px; cursor:pointer;" onclick="resetToInitial()">닫기</button>
        </div>
    </div>

    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>🔑 로그인</h2>
            <button class="social-btn" onclick="signInWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google로 시작하기
            </button>
            <button style="background:none; border:none; color:#aaa; margin-top:20px; cursor:pointer;" onclick="closeAuthModal()">닫기</button>
        </div>
    </div>

    <div id="winning-history-page" class="page-container">
        <div class="page-header">
            <div class="back-btn" onclick="closeWinningHistory()">←</div>
            <div style="font-weight:bold;">🏆 역대 당첨번호</div>
        </div>
        <div id="winning-history-content"></div>
    </div>

    <div id="my-numbers-page" class="page-container">
        <div class="page-header">
            <div class="back-btn" onclick="closeMyNumbersPage()">←</div>
            <div style="font-weight:bold;">💾 내 저장 번호</div>
        </div>
        <div id="my-numbers-content"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, collection, addDoc, query, where, orderBy, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDYCDVuP8z59cT1vvyH9vtfuavqSg9SylG",
            authDomain: "my-gold-toad-lotto.firebaseapp.com",
            projectId: "my-gold-toad-lotto",
            storageBucket: "my-gold-toad-lotto.firebasestorage.app",
            messagingSenderId: "885154200318",
            appId: "1:885154200318:web:c507895df31c2bca8c43af"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('menu-guest').style.display = 'none';
                document.getElementById('menu-user').style.display = 'block';
                document.getElementById('menuUserEmail').textContent = user.email;
            } else {
                document.getElementById('menu-guest').style.display = 'block';
                document.getElementById('menu-user').style.display = 'none';
            }
        });

        // 전역 함수 등록
        window.toggleMenu = () => document.getElementById('menuDropdown').classList.toggle('show');
        window.showAuthModal = () => { toggleMenu(); document.getElementById('auth-modal').style.display = 'flex'; setTimeout(() => document.getElementById('auth-modal').style.opacity = '1', 50); };
        window.closeAuthModal = () => { document.getElementById('auth-modal').style.opacity = '0'; setTimeout(() => document.getElementById('auth-modal').style.display = 'none', 400); };
        
        window.signInWithGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                closeAuthModal();
            } catch (error) {
                alert('로그인 실패: ' + error.message);
            }
        };

        window.logoutUser = () => signOut(auth);

        window.saveNumbersWithAuth = async () => {
            if (!currentUser) return showAuthModal();
            try {
                await addDoc(collection(db, 'lotto_history'), {
                    userId: currentUser.uid,
                    numbers: window.currentNumbers,
                    createdAt: new Date().toISOString(),
                    timestamp: new Date()
                });
                alert('💾 저장되었습니다!');
                resetToInitial();
            } catch (e) { alert('저장 실패'); }
        };

        window.showWinningHistory = async () => {
            toggleMenu();
            const page = document.getElementById('winning-history-page');
            page.style.display = 'block';
            const content = document.getElementById('winning-history-content');
            content.innerHTML = '<div style="text-align:center; padding:50px;">불러오는 중...</div>';

            try {
                const firstDrawDate = new Date('2002-12-07 21:00:00');
                const latestRound = Math.floor((new Date() - firstDrawDate) / (1000*60*60*24*7)) + 1;
                let html = '';
                
                for(let i=0; i<5; i++) {
                    const round = latestRound - i;
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=${round}`)}`);
                    const raw = await res.json();
                    const data = JSON.parse(raw.contents);
                    
                    if(data.returnValue === 'success') {
                        const nums = [data.drwtNo1, data.drwtNo2, data.drwtNo3, data.drwtNo4, data.drwtNo5, data.drwtNo6];
                        html += `
                            <div class="winning-card">
                                <div style="color:#fbbf24; font-weight:bold; margin-bottom:10px;">${data.drwNo}회 (${data.drwNoDate})</div>
                                <div style="display:flex; gap:5px; justify-content:center;">
                                    ${nums.map(n => `<div class="card-ball c${Math.ceil(n/10)>5?5:Math.ceil(n/10)}">${n}</div>`).join('')}
                                    <div style="line-height:32px;">+</div>
                                    <div class="card-ball c${Math.ceil(data.bnusNo/10)>5?5:Math.ceil(data.bnusNo/10)}">${data.bnusNo}</div>
                                </div>
                            </div>`;
                    }
                }
                content.innerHTML = html;
            } catch (e) { content.innerHTML = '<div style="text-align:center; padding:50px;">데이터를 가져오지 못했습니다.</div>'; }
        };

        window.openMyNumbersPage = async () => {
            toggleMenu();
            const page = document.getElementById('my-numbers-page');
            page.style.display = 'block';
            const content = document.getElementById('my-numbers-content');
            
            const q = query(collection(db, 'lotto_history'), where('userId', '==', currentUser.uid), orderBy('timestamp', 'desc'));
            const snap = await getDocs(q);
            let html = '';
            snap.forEach(docSnap => {
                const data = docSnap.data();
                html += `
                    <div class="winning-card">
                        <div style="font-size:0.7rem; color:#aaa; margin-bottom:10px;">${new Date(data.createdAt).toLocaleString()}</div>
                        <div style="display:flex; gap:5px; justify-content:center;">
                            ${data.numbers.map(n => `<div class="card-ball c${Math.ceil(n/10)>5?5:Math.ceil(n/10)}">${n}</div>`).join('')}
                        </div>
                    </div>`;
            });
            content.innerHTML = html || '<div style="text-align:center; padding:50px;">저장된 번호가 없습니다.</div>';
        };

        window.closeWinningHistory = () => document.getElementById('winning-history-page').style.display = 'none';
        window.closeMyNumbersPage = () => document.getElementById('my-numbers-page').style.display = 'none';
    </script>

    <script>
        // 애니메이션 및 번호 추첨 로직
        const trigger = document.getElementById('coin-trigger');
        const display = document.getElementById('result-area');
        const modal = document.getElementById('modal-overlay');
        const modalNums = document.getElementById('modal-numbers');
        window.currentNumbers = [];

        trigger.addEventListener('click', () => {
            if(display.innerHTML !== '') return;
            let nums = [];
            while(nums.length < 6) { let r = Math.floor(Math.random()*45)+1; if(!nums.includes(r)) nums.push(r); }
            nums.sort((a,b) => a-b);
            window.currentNumbers = nums;

            nums.forEach((n, i) => {
                setTimeout(() => {
                    const cIdx = Math.ceil(n/10) > 5 ? 5 : Math.ceil(n/10);
                    display.innerHTML += `<div class="ball c${cIdx}">${n}</div>`;
                    modalNums.innerHTML += `<div class="ball c${cIdx}">${n}</div>`;
                    if(i === 5) {
                        setTimeout(() => { modal.style.display = 'flex'; setTimeout(() => modal.style.opacity = '1', 50); }, 1000);
                    }
                }, i * 200);
            });
        });

        window.resetToInitial = () => {
            modal.style.opacity = '0';
            setTimeout(() => { modal.style.display = 'none'; display.innerHTML = ''; modalNums.innerHTML = ''; }, 400);
        };
    </script>
</body>
</html>
